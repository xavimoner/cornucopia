from pathlib import Path

# Contingut SVG del logotip basat en la descripció anterior
svg_content = """
<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 40px 'Montserrat', sans-serif; fill: #6A0DAD; }
    .subtitle { font: 24px 'Montserrat', sans-serif; fill: #FF6B00; }
    .money { fill: #7BD389; stroke: #20693D; stroke-width: 2; }
    .symbol { font: bold 20px sans-serif; fill: #20693D; }
    .horn { fill: #6A0DAD; }
  </style>

  <!-- Cornucòpia estilitzada -->
  <path class="horn" d="M50,100 q50,-80 100,0 t100,0" stroke="none" />
  
  <!-- Bitllets -->
  <rect class="money" x="160" y="30" width="30" height="50" rx="3" ry="3" />
  <rect class="money" x="185" y="40" width="30" height="50" rx="3" ry="3" />
  <rect class="money" x="210" y="35" width="30" height="50" rx="3" ry="3" />
  <text x="167" y="60" class="symbol">$</text>
  <text x="192" y="70" class="symbol">$</text>
  <text x="217" y="65" class="symbol">$</text>

  <!-- Text principal -->
  <text x="260" y="80" class="title">CORNUCOPIA</text>
  <text x="260" y="120" class="subtitle">el teu cercador de subvencions</text>
</svg>
"""

# Guardar l'SVG
output_path = Path("/mnt/data/cornucopia_logo_definitiu.svg")
output_path.write_text(svg_content.strip(), encoding="utf-8")

output_path.name

